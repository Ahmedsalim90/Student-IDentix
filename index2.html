<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>IDentix — Smart ID Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-deep:   #0d0018;
      --purple-dark:   #1a0035;
      --purple-mid:    #3b0072;
      --purple-bright: #7c29d4;
      --purple-glow:   #a855f7;
      --purple-light:  #c084fc;
      --purple-pale:   #e9d5ff;
      --white:         #ffffff;
      --text-muted:    #c4b5fd;
      --card-bg:       rgba(60, 10, 110, 0.55);
      --card-border:   rgba(160, 85, 250, 0.4);
      --font-display:  'Syne', sans-serif;
      --font-body:     'DM Sans', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      background: var(--purple-deep);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Canvas background ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Nebula blobs ── */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .nebula-1 {
      width: min(60vw, 340px); height: min(60vw, 340px);
      background: radial-gradient(circle, #7c29d4, transparent 70%);
      top: -10%; left: -10%;
      animation: nebula-drift 12s ease-in-out infinite alternate;
    }
    .nebula-2 {
      width: min(50vw, 280px); height: min(50vw, 280px);
      background: radial-gradient(circle, #4f46e5, transparent 70%);
      bottom: -5%; right: -10%;
      animation: nebula-drift 16s ease-in-out infinite alternate-reverse;
    }
    .nebula-3 {
      width: min(35vw, 200px); height: min(35vw, 200px);
      background: radial-gradient(circle, #a855f7, transparent 70%);
      top: 40%; left: 50%;
      animation: nebula-drift 10s ease-in-out infinite alternate;
    }
    @keyframes nebula-drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, 30px) scale(1.12); }
    }

    /* ── Page wrapper ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      padding: clamp(16px, 4vw, 40px) clamp(16px, 5vw, 48px);
      gap: 0;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      animation: bounce-logo 2.6s cubic-bezier(.36,.07,.19,.97) infinite;
    }
    .logo-wrap img {
      width: min(88vw, 420px);
      height: auto;
      max-height: clamp(90px, 24vw, 200px);
      object-fit: contain;
      filter: invert(1) brightness(2) drop-shadow(0 0 22px rgba(168, 85, 247, 0.85));
    }
    .logo-fallback {
      width: min(72vw, 260px);
      height: clamp(56px, 14vw, 96px);
      background: linear-gradient(135deg, #a855f7 0%, #7c3aed 50%, #4f46e5 100%);
      border-radius: clamp(12px, 3vw, 20px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: clamp(22px, 6vw, 40px);
      font-weight: 800;
      letter-spacing: clamp(3px, 1vw, 8px);
      color: var(--white);
      filter: drop-shadow(0 0 22px rgba(168, 85, 247, 0.8));
    }
    @keyframes bounce-logo {
      0%,100% { transform: translateY(0); }
      28%     { transform: translateY(-16px); }
      55%     { transform: translateY(-7px); }
      72%     { transform: translateY(-12px); }
      88%     { transform: translateY(-3px); }
    }

    /* ── Headline ── */
    .headline-block {
      text-align: center;
    }
    .headline-block h1 {
      font-family: var(--font-display);
      font-size: clamp(22px, 6.5vw, 48px);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(100deg, #e0aaff 0%, #fff 40%, #c084fc 70%, #fff 100%);
      background-size: 220% auto;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer-text 4s linear infinite;
      margin-bottom: clamp(4px, 1.2vw, 10px);
    }
    .headline-block p {
      color: var(--text-muted);
      font-size: clamp(12px, 3.2vw, 16px);
      font-weight: 400;
    }
    @keyframes shimmer-text {
      0%   { background-position: -100% center; }
      100% { background-position: 220% center; }
    }

    /* ── Cards ── */
    .cards {
      display: flex;
      gap: clamp(10px, 2.5vw, 20px);
      width: 100%;
      max-width: 780px;
      justify-content: center;
    }
    .card {
      flex: 1;
      min-width: 0;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: clamp(14px, 3.5vw, 24px);
      padding: clamp(14px, 3vw, 28px) clamp(10px, 2.5vw, 22px);
      text-align: center;
      color: var(--white);
      cursor: default;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1),
                  border-color 0.25s ease,
                  box-shadow 0.25s ease;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(192,132,252,0.18), transparent 65%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.05);
      border-color: var(--purple-light);
      box-shadow: 0 12px 36px rgba(124, 41, 212, 0.5), 0 0 0 1px rgba(192,132,252,0.25);
    }
    .card:hover::after { opacity: 1; }
    .card-icon {
      font-size: clamp(20px, 5vw, 32px);
      color: var(--purple-light);
      margin-bottom: clamp(6px, 1.5vw, 12px);
    }
    .card h3 {
      font-family: var(--font-display);
      font-size: clamp(10px, 2.8vw, 15px);
      font-weight: 700;
      color: var(--purple-pale);
      margin-bottom: clamp(4px, 1vw, 8px);
      line-height: 1.2;
    }
    .card p {
      font-size: clamp(9px, 2.2vw, 12px);
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── CTA Button ── */
    .cta-wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      justify-content: center;
    }
    .cta-btn {
      display: inline-block;
      width: 100%;
      max-width: 340px;
      padding: clamp(13px, 3.2vw, 18px) clamp(24px, 6vw, 48px);
      background: linear-gradient(135deg, #7c29d4 0%, #a855f7 60%, #c084fc 100%);
      border: none;
      border-radius: 100px;
      color: var(--white);
      font-family: var(--font-display);
      font-size: clamp(13px, 3.5vw, 18px);
      font-weight: 800;
      letter-spacing: clamp(1px, 0.4vw, 3px);
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: pulse-glow 2.8s ease-in-out infinite;
      transition: transform 0.16s ease, filter 0.16s ease;
    }
    .cta-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: btn-shine 3s ease-in-out infinite;
    }
    .cta-btn:hover {
      transform: scale(1.07);
      filter: brightness(1.18);
    }
    .cta-btn:active {
      transform: scale(0.96);
    }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 18px rgba(168,85,247,0.6), 0 0 40px rgba(168,85,247,0.2); }
      50%      { box-shadow: 0 0 28px rgba(168,85,247,0.9), 0 0 60px rgba(168,85,247,0.4); }
    }
    @keyframes btn-shine {
      0%   { left: -100%; }
      60%, 100% { left: 160%; }
    }

    /* ── Floating particles ── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: particle-float linear infinite;
      opacity: 0;
    }
    @keyframes particle-float {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
    }

    /* ══════════════════════════════════
       DESKTOP OVERRIDES  (>= 640px)
    ══════════════════════════════════ */
    @media (min-width: 640px) {
      html, body { overflow: hidden; }
      .page { padding: clamp(24px, 3vw, 60px) clamp(40px, 6vw, 100px); }
      .card p { font-size: clamp(11px, 1.4vw, 14px); }
    }

    /* Taller phones / tablets in portrait — give cards a bit more room */
    @media (min-height: 750px) {
      .page { justify-content: center; gap: clamp(16px, 3vh, 36px); }
    }

    /* Very small screens (e.g. iPhone SE) */
    @media (max-height: 580px) {
      .logo-wrap img, .logo-fallback { max-height: 52px; }
      .card { padding: 10px 8px; }
      .page { justify-content: space-around; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <main class="page">

    <!-- Logo -->
    <div class="logo-wrap">
      <img
        src="./images/IMG-20260421-WA0116-removebg-preview.png"
        alt="IDentix logo"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      >
      <div class="logo-fallback" style="display:none;">IDentix</div>
    </div>

    <!-- Headline -->
    <div class="headline-block">
      <h1>Welcome to IDentix</h1>
      <p>Register your information for your ID Card.</p>
    </div>

    <!-- Feature cards -->
    <div class="cards">
      <div class="card">
        <div class="card-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <h3>Secure &amp; Reliable</h3>
        <p>Your data is protected with advanced security.</p>
      </div>
      <div class="card">
        <div class="card-icon"><i class="fa-solid fa-bolt"></i></div>
        <h3>Quick Access</h3>
        <p>Easy and fast enrollment to get your ID cards.</p>
      </div>
      <div class="card">
        <div class="card-icon"><i class="fa-solid fa-id-card"></i></div>
        <h3>Smart Identity</h3>
        <p>One identity for your school with IDentix.</p>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-wrap">
      <a href="register1.html" class="cta-btn">Get My ID Card</a>
    </div>

  </main>

  <script>
    /* ── Starfield canvas ── */
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const STAR_COUNT = 130;
    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.6 + 0.2,
      opac: Math.random(),
      speed: (Math.random() - 0.5) * 0.025
    }));

    (function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.opac += s.speed;
        if (s.opac > 1 || s.opac < 0.05) s.speed *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.opac.toFixed(2)})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    })();

    /* ── Cursor / touch particles ── */
    function spawnParticle(x, y) {
      const p   = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 3;
      const dur  = Math.random() * 1.4 + 0.8;
      const hue  = Math.random() * 60 + 260;
      Object.assign(p.style, {
        width: size + 'px', height: size + 'px',
        left: x + 'px', top: y + 'px',
        background: `hsl(${hue},80%,70%)`,
        animationDuration: dur + 's',
        animationDelay: '0s'
      });
      document.body.appendChild(p);
      setTimeout(() => p.remove(), (dur + 0.1) * 1000);
    }

    let lastParticle = 0;
    document.addEventListener('mousemove', e => {
      if (Date.now() - lastParticle < 60) return;
      lastParticle = Date.now();
      spawnParticle(e.clientX, e.clientY);
    });
    document.addEventListener('touchmove', e => {
      if (Date.now() - lastParticle < 80) return;
      lastParticle = Date.now();
      const t = e.touches[0];
      spawnParticle(t.clientX, t.clientY);
    }, { passive: true });
  </script>
</body>
</html>
